# ===========================================
# Cloud Build - DEV Environment
# ===========================================
# Triggered on push/merge to 'dev' branch
# Deploys to Cloud Run with versioning

steps:
  # Step 1: Get the short commit SHA for versioning
  - name: 'gcr.io/cloud-builders/git'
    id: 'get-version'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "BUILD_VERSION=$(date +%Y%m%d)-${SHORT_SHA}" > /workspace/version.env
        cat /workspace/version.env

  # Step 2: Build the Docker image with version tag
  # NEXT_PUBLIC_* variables must be passed at build time for client components
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$SHORT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:dev-latest'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:dev-$BUILD_ID'
      - '--build-arg'
      - 'NODE_ENV=production'
      - '--build-arg'
      - 'NEXT_PUBLIC_DEALER_NAME=E&S Car Sales'
      - '--build-arg'
      - 'NEXT_PUBLIC_DEALER_PHONE=+1 (941) 499-7415'
      - '--build-arg'
      - 'NEXT_PUBLIC_DEALER_ADDRESS=1029 Airport-Pulling Rd unit c 49 Naples FL 34104'
      - '--build-arg'
      - 'NEXT_PUBLIC_DEALER_EMAIL=info@eandscars.com'
      - '--build-arg'
      - 'NEXT_PUBLIC_SITE_URL=https://es-front-dev-124746959305.us-east1.run.app'
      - '--build-arg'
      - 'NEXT_PUBLIC_WHATSAPP_NUMBER=19414997415'
      - '.'

  # Step 3: Push all image tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE'

  # Step 4: Run database migrations
  - name: 'node:20-slim'
    id: 'migrate'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y curl openssl
        curl -o /tmp/cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.8.0/cloud-sql-proxy.linux.amd64
        chmod +x /tmp/cloud-sql-proxy
        /tmp/cloud-sql-proxy $PROJECT_ID:$_REGION:$_CLOUD_SQL_INSTANCE --port 5432 &
        sleep 5
        npm ci --legacy-peer-deps
        npx prisma generate
        npx prisma migrate deploy
    secretEnv: ['DATABASE_URL']

  # Step 5: Deploy to Cloud Run (DEV)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE-dev'
      - '--image'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$SHORT_SHA'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances'
      - '$PROJECT_ID:$_REGION:$_CLOUD_SQL_INSTANCE'
      - '--set-env-vars'
      - 'NODE_ENV=production,NEXT_PUBLIC_DEALER_NAME=E&S Car Sales (DEV),NEXT_PUBLIC_DEALER_PHONE=+1 (941) 499-7415,NEXT_PUBLIC_DEALER_ADDRESS=1029 Airport-Pulling Rd unit c 49 Naples FL 34104,GCS_BUCKET_NAME=$_GCS_BUCKET,GCS_PROJECT_ID=$PROJECT_ID,BUILD_VERSION=$SHORT_SHA'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL_DEV:latest,ADMIN_EMAIL=ADMIN_EMAIL_DEV:latest,ADMIN_PASSWORD=ADMIN_PASSWORD_DEV:latest,ADMIN_SESSION_SECRET=ADMIN_SESSION_SECRET_DEV:latest'
      - '--revision-suffix'
      - 'v-$SHORT_SHA'
      - '--tag'
      - 'dev'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'

  # Step 6: Output the deployed URL
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'get-url'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        echo "============================================="
        echo "DEV Deployment Complete!"
        echo "Version: $SHORT_SHA"
        echo "Build ID: $BUILD_ID"
        gcloud run services describe $_SERVICE-dev --region=$_REGION --format='value(status.url)'
        echo "============================================="

# Substitution variables (can be overridden in trigger)
substitutions:
  _REGION: us-east1
  _REPO: es-front
  _SERVICE: es-front
  _CLOUD_SQL_INSTANCE: es-cars-dev-db
  _GCS_BUCKET: es-cars-dev-images

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Secrets for migration step
availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/DATABASE_URL_MIGRATE/versions/latest
      env: 'DATABASE_URL'

# Store build artifacts info
artifacts:
  objects:
    location: 'gs://${_GCS_BUCKET}/builds/'
    paths: ['/workspace/version.env']

# Timeout (15 minutes)
timeout: '900s'

# Images to be pushed
images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$SHORT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:dev-latest'
