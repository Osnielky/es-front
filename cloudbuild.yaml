steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$COMMIT_SHA'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$COMMIT_SHA'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE'
      - '--image'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO/$_SERVICE:$COMMIT_SHA'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances'
      - '$PROJECT_ID:$_REGION:$_CLOUD_SQL_INSTANCE'
      - '--set-env-vars'
      - 'NODE_ENV=production,NEXT_PUBLIC_SITE_URL=https://es-front-xxxxxxxxxx-ue.a.run.app,NEXT_PUBLIC_DEALER_NAME=E&S Car Sales,NEXT_PUBLIC_DEALER_PHONE=+1 (941) 499-7415,NEXT_PUBLIC_DEALER_ADDRESS=1029 Airport-Pulling Rd unit c 49 Naples FL 34104,GCS_BUCKET_NAME=es-cars-dev-images,GCS_PROJECT_ID=es-cars-dev'
      - '--set-secrets'
      - 'DATABASE_URL=DATABASE_URL_DEV:latest,/secrets/credentials/credentials.json=CREDENTIALS_DEV:latest'

substitutions:
  _REGION: us-east1
  _REPO: es-front
  _SERVICE: es-front
  _CLOUD_SQL_INSTANCE: es-cars-dev-db

options:
  logging: CLOUD_LOGGING_ONLY
